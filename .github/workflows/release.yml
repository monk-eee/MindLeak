name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  metadata:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v5
      - name: Match tag to workspace version
        id: metadata
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const manifest = fs.readFileSync("Cargo.toml", "utf8");
            const extension = JSON.parse(fs.readFileSync("editors/vscode/package.json", "utf8"));
            const workspace = manifest.match(/\[workspace\.package\]([\s\S]*?)(?:\n\[|$)/);
            const version = workspace?.[1].match(/^\s*version\s*=\s*"([^"]+)"/m)?.[1];
            const tag = process.env.GITHUB_REF_NAME;
            if (!version) {
              core.setFailed("Cargo.toml has no workspace package version");
              return;
            }
            if (!/^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/.test(tag)) {
              core.setFailed(`release tag '${tag}' is not a supported semantic version tag`);
              return;
            }
            if (tag.slice(1).split("-", 1)[0] !== version) {
              core.setFailed(`release tag '${tag}' does not match workspace version '${version}'`);
              return;
            }
            if (extension.version !== version) {
              core.setFailed(`extension version '${extension.version}' does not match workspace version '${version}'`);
              return;
            }
            core.setOutput("tag", tag);
            core.setOutput("prerelease", String(tag.includes("-")));

  quality:
    name: Quality gate
    needs: metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install extension dependencies
        run: npm --prefix editors/vscode ci
      - name: Run repository quality gate
        run: make ci

  build:
    name: Build ${{ matrix.asset }}
    needs: [metadata, quality]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
            asset: windows-x64
            vscode_target: win32-x64
            extension: .exe
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            architecture: x64
            asset: linux-x64
            vscode_target: linux-x64
            extension: ""
          - os: macos-14
            target: x86_64-apple-darwin
            architecture: x64
            asset: macos-x64
            vscode_target: darwin-x64
            extension: ""
          - os: macos-14
            target: aarch64-apple-darwin
            architecture: arm64
            asset: macos-arm64
            vscode_target: darwin-arm64
            extension: ""
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install extension release dependencies
        run: npm --prefix editors/vscode ci
      - name: Build servers
        run: >-
          cargo build --release --locked --target ${{ matrix.target }}
          -p mindleak-mcp -p lodestar-mcp
      - name: Smoke test native servers
        uses: actions/github-script@v7
        env:
          TARGET: ${{ matrix.target }}
          TARGET_ARCHITECTURE: ${{ matrix.architecture }}
          EXECUTABLE_EXTENSION: ${{ matrix.extension }}
        with:
          script: |
            const path = require("path");
            const { spawn } = require("child_process");
            const readline = require("readline");
            if (process.arch !== process.env.TARGET_ARCHITECTURE) {
              core.notice(`Skipping execution of cross-compiled ${process.env.TARGET} binaries on ${process.arch}`);
              return;
            }
            const directory = path.join("target", process.env.TARGET, "release");
            const extension = process.env.EXECUTABLE_EXTENSION;
            async function smoke(server, databaseVariable) {
              const binary = path.resolve(directory, `${server}${extension}`);
              await new Promise((resolve, reject) => {
                const child = spawn(binary, [], {
                  env: {
                    ...process.env,
                    [databaseVariable]: ":memory:",
                    MINDLEAK_AUTONOMOUS_PRUNE: "false",
                    MINDLEAK_AUTONOMOUS_CONSOLIDATION: "false",
                  },
                  stdio: ["pipe", "pipe", "pipe"],
                });
                let stderr = "";
                const timer = setTimeout(() => {
                  child.kill();
                  reject(new Error(`${server} smoke test timed out: ${stderr}`));
                }, 10000);
                const finish = (error) => {
                  clearTimeout(timer);
                  child.kill();
                  error ? reject(error) : resolve();
                };
                child.on("error", finish);
                child.stderr.on("data", (chunk) => { stderr += chunk.toString(); });
                readline.createInterface({ input: child.stdout }).on("line", (line) => {
                  let message;
                  try {
                    message = JSON.parse(line);
                  } catch (error) {
                    finish(new Error(`${server} emitted invalid JSON: ${line}`));
                    return;
                  }
                  if (message.id === 1 && message.result) {
                    child.stdin.write(JSON.stringify({ jsonrpc: "2.0", id: 2, method: "tools/list", params: {} }) + "\n");
                  } else if (message.id === 2) {
                    if (!Array.isArray(message.result?.tools) || message.result.tools.length === 0) {
                      finish(new Error(`${server} returned no tools`));
                    } else {
                      child.stdin.write(JSON.stringify({
                        jsonrpc: "2.0",
                        id: 3,
                        method: "tools/call",
                        params: {
                          name: "open_session",
                          arguments: { session_id: "00112233445566778899aabbccddeeff" },
                        },
                      }) + "\n");
                    }
                  } else if (message.id === 3) {
                    const text = message.result?.content?.[0]?.text;
                    const identity = typeof text === "string" ? JSON.parse(text)?.agent_id : null;
                    identity?.startsWith("session:v1:")
                      ? finish()
                      : finish(new Error(`${server} did not register a session identity`));
                  } else if (message.error) {
                    finish(new Error(`${server} returned an MCP error: ${JSON.stringify(message.error)}`));
                  }
                });
                child.stdin.write(JSON.stringify({
                  jsonrpc: "2.0",
                  id: 1,
                  method: "initialize",
                  params: {
                    protocolVersion: "2024-11-05",
                    capabilities: {},
                    clientInfo: { name: "mindleak-release-smoke", version: "1" },
                  },
                }) + "\n");
              });
            }
            await smoke("mindleak-mcp", "MINDLEAK_DB");
            await smoke("lodestar-mcp", "LODESTAR_DB");
      - name: Stage release contents
        uses: actions/github-script@v7
        env:
          TARGET: ${{ matrix.target }}
          ASSET: ${{ matrix.asset }}
          EXECUTABLE_EXTENSION: ${{ matrix.extension }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const directory = path.join("target", process.env.TARGET, "release");
            const extension = process.env.EXECUTABLE_EXTENSION;
            fs.mkdirSync("dist", { recursive: true });
            fs.mkdirSync(path.join("editors", "vscode", "bin"), { recursive: true });
            for (const server of ["mindleak-mcp", "lodestar-mcp"]) {
              const source = path.join(directory, `${server}${extension}`);
              const destination = path.join("dist", `${server}${extension}`);
              const extensionDestination = path.join("editors", "vscode", "bin", `${server}${extension}`);
              fs.copyFileSync(source, destination);
              fs.copyFileSync(source, extensionDestination);
              if (process.platform !== "win32") {
                fs.chmodSync(destination, 0o755);
                fs.chmodSync(extensionDestination, 0o755);
              }
            }
            fs.copyFileSync("LICENSE", path.join("dist", "LICENSE"));
            fs.writeFileSync(path.join("dist", "VERSION"), `${process.env.GITHUB_REF_NAME}\n`);
            fs.writeFileSync(
              path.join("dist", "README.txt"),
              [
                `MindLeak ${process.env.GITHUB_REF_NAME} (${process.env.ASSET})`,
                "",
                "This bundle contains mindleak-mcp and lodestar-mcp.",
                "From your workspace, run: node /path/to/extracted/install.mjs",
                "The installer smoke-tests and registers both local stdio MCP servers.",
                "GitHub provenance attestations and SHA-256 checksums are published with this release.",
                "The binaries are not OS publisher-signed; your operating system may show a warning.",
                "",
              ].join("\n"),
            );
      - name: Bundle installer
        run: npm --prefix editors/vscode run bundle:installer
      - name: Package targeted VS Code extension
        run: >-
          npm --prefix editors/vscode run package:vsix --
          --target ${{ matrix.vscode_target }}
          --out ${{ github.workspace }}/dist/mindleak-${{ needs.metadata.outputs.tag }}-${{ matrix.asset }}.vsix
      - name: Verify targeted VS Code extension
        run: >-
          npm --prefix editors/vscode run verify:vsix --
          --file ../../dist/mindleak-${{ needs.metadata.outputs.tag }}-${{ matrix.asset }}.vsix
          --extension ${{ matrix.extension }}
      - name: Package native installer bundle
        run: >-
          npm --prefix editors/vscode run bundle:release --
          --source ../../dist
          --out ../../dist/mindleak-${{ needs.metadata.outputs.tag }}-${{ matrix.asset }}.zip
          --files mindleak-mcp${{ matrix.extension }} lodestar-mcp${{ matrix.extension }}
          install.mjs VERSION LICENSE README.txt
      - name: Attest release contents
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.zip
            dist/*.vsix
      - name: Upload platform bundle
        uses: actions/upload-artifact@v7
        with:
          name: mindleak-${{ needs.metadata.outputs.tag }}-${{ matrix.asset }}
          path: |
            dist/*.zip
            dist/*.vsix
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub release
    needs: [metadata, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          pattern: mindleak-${{ needs.metadata.outputs.tag }}-*
          path: dist
          merge-multiple: true
      - name: Validate assets and generate checksums
        id: assets
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        with:
          script: |
            const crypto = require("crypto");
            const fs = require("fs");
            const path = require("path");
            const platforms = ["windows-x64", "linux-x64", "macos-x64", "macos-arm64"];
            const expected = platforms.flatMap((platform) => [
              `mindleak-${process.env.RELEASE_TAG}-${platform}.zip`,
              `mindleak-${process.env.RELEASE_TAG}-${platform}.vsix`,
            ]).sort();
            const actual = fs.readdirSync("dist").sort();
            const missing = expected.filter((name) => !actual.includes(name));
            const unexpected = actual.filter((name) => !expected.includes(name));
            if (missing.length || unexpected.length) {
              core.setFailed(`release asset mismatch; missing=${missing.join(",")}; unexpected=${unexpected.join(",")}`);
              return;
            }
            const checksums = expected.map((name) => {
              const bytes = fs.readFileSync(path.join("dist", name));
              return `${crypto.createHash("sha256").update(bytes).digest("hex")}  ${name}`;
            });
            fs.writeFileSync(path.join("dist", "SHA256SUMS"), checksums.join("\n") + "\n");
      - name: Create release and upload assets
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const tag = process.env.RELEASE_TAG;
            let release;
            try {
              ({ data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              }));
            } catch (error) {
              if (error.status !== 404) throw error;
              ({ data: release } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `MindLeak ${tag}`,
                prerelease: process.env.PRERELEASE === "true",
                generate_release_notes: true,
                body: [
                  "Each platform archive contains both MCP servers plus the one-command `install.mjs` workspace registrar.",
                  "Each targeted VSIX contains the same platform's servers for a self-contained VS Code experience.",
                  "Verify assets against `SHA256SUMS`; signed GitHub provenance attestations are also available.",
                  "The binaries are not OS publisher-signed, so your operating system may show a warning.",
                ].join("\n\n"),
              }));
            }
            const existing = new Map(release.assets.map((asset) => [asset.name, asset.id]));
            for (const name of fs.readdirSync("dist").sort()) {
              if (existing.has(name)) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: existing.get(name),
                });
              }
              const file = path.join("dist", name);
              const data = fs.readFileSync(file);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name,
                data,
                headers: {
                  "content-type": name === "SHA256SUMS" ? "text/plain" : "application/zip",
                  "content-length": data.length,
                },
              });
            }
