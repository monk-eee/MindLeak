name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  metadata:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - name: Match tag to workspace version
        id: metadata
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const manifest = fs.readFileSync("Cargo.toml", "utf8");
            const workspace = manifest.match(/\[workspace\.package\]([\s\S]*?)(?:\n\[|$)/);
            const version = workspace?.[1].match(/^\s*version\s*=\s*"([^"]+)"/m)?.[1];
            const tag = process.env.GITHUB_REF_NAME;
            if (!version) {
              core.setFailed("Cargo.toml has no workspace package version");
              return;
            }
            if (!/^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/.test(tag)) {
              core.setFailed(`release tag '${tag}' is not a supported semantic version tag`);
              return;
            }
            if (tag.slice(1).split("-", 1)[0] !== version) {
              core.setFailed(`release tag '${tag}' does not match workspace version '${version}'`);
              return;
            }
            core.setOutput("tag", tag);
            core.setOutput("prerelease", String(tag.includes("-")));

  quality:
    name: Quality gate
    needs: metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install extension dependencies
        run: npm --prefix editors/vscode ci
      - name: Run repository quality gate
        run: make ci

  build:
    name: Build ${{ matrix.asset }}
    needs: [metadata, quality]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
            asset: windows-x64
            extension: .exe
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            architecture: x64
            asset: linux-x64
            extension: ""
          - os: macos-14
            target: x86_64-apple-darwin
            architecture: x64
            asset: macos-x64
            extension: ""
          - os: macos-14
            target: aarch64-apple-darwin
            architecture: arm64
            asset: macos-arm64
            extension: ""
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Build servers
        run: >-
          cargo build --release --locked --target ${{ matrix.target }}
          -p mindleak-mcp -p lodestar-mcp
      - name: Smoke test native servers
        uses: actions/github-script@v7
        env:
          TARGET: ${{ matrix.target }}
          TARGET_ARCHITECTURE: ${{ matrix.architecture }}
          EXECUTABLE_EXTENSION: ${{ matrix.extension }}
        with:
          script: |
            const path = require("path");
            const { spawn } = require("child_process");
            const readline = require("readline");
            if (process.arch !== process.env.TARGET_ARCHITECTURE) {
              core.notice(`Skipping execution of cross-compiled ${process.env.TARGET} binaries on ${process.arch}`);
              return;
            }
            const directory = path.join("target", process.env.TARGET, "release");
            const extension = process.env.EXECUTABLE_EXTENSION;
            async function smoke(server, databaseVariable) {
              const binary = path.resolve(directory, `${server}${extension}`);
              await new Promise((resolve, reject) => {
                const child = spawn(binary, [], {
                  env: { ...process.env, [databaseVariable]: ":memory:" },
                  stdio: ["pipe", "pipe", "pipe"],
                });
                let stderr = "";
                const timer = setTimeout(() => {
                  child.kill();
                  reject(new Error(`${server} smoke test timed out: ${stderr}`));
                }, 10000);
                const finish = (error) => {
                  clearTimeout(timer);
                  child.kill();
                  error ? reject(error) : resolve();
                };
                child.on("error", finish);
                child.stderr.on("data", (chunk) => { stderr += chunk.toString(); });
                readline.createInterface({ input: child.stdout }).on("line", (line) => {
                  let message;
                  try {
                    message = JSON.parse(line);
                  } catch (error) {
                    finish(new Error(`${server} emitted invalid JSON: ${line}`));
                    return;
                  }
                  if (message.id === 1 && message.result) {
                    child.stdin.write(JSON.stringify({ jsonrpc: "2.0", id: 2, method: "tools/list", params: {} }) + "\n");
                  } else if (message.id === 2) {
                    if (!Array.isArray(message.result?.tools) || message.result.tools.length === 0) {
                      finish(new Error(`${server} returned no tools`));
                    } else {
                      finish();
                    }
                  } else if (message.error) {
                    finish(new Error(`${server} returned an MCP error: ${JSON.stringify(message.error)}`));
                  }
                });
                child.stdin.write(JSON.stringify({
                  jsonrpc: "2.0",
                  id: 1,
                  method: "initialize",
                  params: {
                    protocolVersion: "2024-11-05",
                    capabilities: {},
                    clientInfo: { name: "mindleak-release-smoke", version: "1" },
                  },
                }) + "\n");
              });
            }
            await smoke("mindleak-mcp", "MINDLEAK_DB");
            await smoke("lodestar-mcp", "LODESTAR_DB");
      - name: Stage release contents
        uses: actions/github-script@v7
        env:
          TARGET: ${{ matrix.target }}
          ASSET: ${{ matrix.asset }}
          EXECUTABLE_EXTENSION: ${{ matrix.extension }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const directory = path.join("target", process.env.TARGET, "release");
            const extension = process.env.EXECUTABLE_EXTENSION;
            fs.mkdirSync("dist", { recursive: true });
            for (const server of ["mindleak-mcp", "lodestar-mcp"]) {
              const source = path.join(directory, `${server}${extension}`);
              const destination = path.join("dist", `${server}${extension}`);
              fs.copyFileSync(source, destination);
              if (process.platform !== "win32") fs.chmodSync(destination, 0o755);
            }
            fs.copyFileSync("LICENSE", path.join("dist", "LICENSE"));
            fs.writeFileSync(
              path.join("dist", "README.txt"),
              [
                `MindLeak ${process.env.GITHUB_REF_NAME} (${process.env.ASSET})`,
                "",
                "This bundle contains mindleak-mcp and lodestar-mcp.",
                "Configure them as local stdio MCP servers in your client.",
                "On macOS and Linux, mark both files executable after extraction.",
                "Preview binaries are not code-signed; your operating system may show a publisher warning.",
                "",
              ].join("\n"),
            );
      - name: Attest release contents
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*
      - name: Upload platform bundle
        uses: actions/upload-artifact@v4
        with:
          name: mindleak-${{ needs.metadata.outputs.tag }}-${{ matrix.asset }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub release
    needs: [metadata, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download bundles and generate checksums
        id: assets
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        with:
          script: |
            const crypto = require("crypto");
            const fs = require("fs");
            const path = require("path");
            fs.mkdirSync("dist", { recursive: true });
            const response = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });
            const prefix = `mindleak-${process.env.RELEASE_TAG}-`;
            const artifacts = response
              .filter((artifact) => artifact.name.startsWith(prefix))
              .sort((left, right) => left.name.localeCompare(right.name));
            if (artifacts.length !== 4) {
              core.setFailed(`expected 4 platform bundles, found ${artifacts.length}`);
              return;
            }
            const checksums = [];
            for (const artifact of artifacts) {
              const archive = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
                archive_format: "zip",
              });
              const bytes = Buffer.from(archive.data);
              const name = `${artifact.name}.zip`;
              fs.writeFileSync(path.join("dist", name), bytes);
              checksums.push(`${crypto.createHash("sha256").update(bytes).digest("hex")}  ${name}`);
            }
            fs.writeFileSync(path.join("dist", "SHA256SUMS"), checksums.join("\n") + "\n");
      - name: Create release and upload assets
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const tag = process.env.RELEASE_TAG;
            let release;
            try {
              ({ data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              }));
            } catch (error) {
              if (error.status !== 404) throw error;
              ({ data: release } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `MindLeak ${tag}`,
                prerelease: process.env.PRERELEASE === "true",
                generate_release_notes: true,
                body: [
                  "Each platform archive contains `mindleak-mcp` and `lodestar-mcp`.",
                  "Verify the archive against `SHA256SUMS` before installation.",
                  "On macOS and Linux, mark both binaries executable after extraction.",
                  "Preview binaries are attested and checksummed but are not yet code-signed.",
                ].join("\n\n"),
              }));
            }
            const existing = new Map(release.assets.map((asset) => [asset.name, asset.id]));
            for (const name of fs.readdirSync("dist").sort()) {
              if (existing.has(name)) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: existing.get(name),
                });
              }
              const file = path.join("dist", name);
              const data = fs.readFileSync(file);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name,
                data,
                headers: {
                  "content-type": name === "SHA256SUMS" ? "text/plain" : "application/zip",
                  "content-length": data.length,
                },
              });
            }