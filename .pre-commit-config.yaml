# Pre-commit hooks for MindLeak.
# Install once:  pip install pre-commit  &&  pre-commit install  &&  pre-commit install --hook-type pre-push
# Run manually:  pre-commit run --all-files
minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (scoped)
        entry: node scripts/cargo-precommit.mjs fmt commit
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy (scoped, committed snapshot)
        entry: node scripts/cargo-precommit.mjs clippy commit
        language: system
        types: [rust]
        pass_filenames: false

      - id: eslint
        name: eslint (vscode extension)
        # Lint only the staged files, not the whole tree, so another agent's
        # unrelated WIP can never poison this commit (ADR-0018).
        entry: node editors/vscode/node_modules/eslint/bin/eslint.js --max-warnings=0
        language: system
        files: ^editors/vscode/src/.*\.ts$
        pass_filenames: true

      - id: prettier
        name: prettier (vscode extension)
        # Check only the staged files, not the whole tree, so another agent's
        # unformatted WIP can never poison this commit (ADR-0018).
        entry: node editors/vscode/node_modules/prettier/bin/prettier.cjs --check
        language: system
        files: ^(editors/vscode/(src|media)/.*\.(ts|js)|scripts/.*\.mjs)$
        pass_filenames: true
      - id: canonical-push
        name: canonical fleet publisher
        entry: node scripts/canonical-push.mjs --verify-pre-push
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # Slower gate — runs on push, not every commit. Validates the pushed
      # commit's tree so another agent's uncommitted WIP cannot poison it.
      - id: cargo-test
        name: cargo test (scoped, committed snapshot)
        entry: node scripts/cargo-precommit.mjs test push
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]
